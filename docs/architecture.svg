<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" role="img" aria-label="llm-slo-checker architecture: YAML config feeds a prober that streams from an LLM endpoint, aggregated into SLIs, evaluated against SLO thresholds, and emitted as a verdict with CI exit codes. Cron mode also commits SLI history to git.">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&amp;family=Geist:wght@400;500;600&amp;family=Geist+Mono:wght@400;500;600&amp;display=swap');
      .sans { font-family: 'Geist', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif; }
      .mono { font-family: 'Geist Mono', ui-monospace, SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace; }
      .serif-italic { font-family: 'Instrument Serif', ui-serif, Georgia, 'Times New Roman', serif; font-style: italic; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/>
    </marker>
    <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#eb6c36"/>
    </marker>
    <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2e5aa8"/>
    </marker>
  </defs>

  <!-- Paper background -->
  <rect width="880" height="460" fill="#f5f5f5"/>

  <!-- ============================================================ -->
  <!-- Arrows (drawn first so nodes sit on top)                      -->
  <!-- ============================================================ -->

  <!-- 1. YAML Config -> Prober (main pipeline, muted) -->
  <line x1="168" y1="228" x2="200" y2="228" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 2. Prober -> LLM Endpoint (PROBE, link-blue up) -->
  <line x1="256" y1="200" x2="256" y2="120" stroke="#2e5aa8" stroke-width="1" marker-end="url(#arrow-link)"/>

  <!-- 3. LLM Endpoint -> Prober (STREAM, link-blue dashed down) -->
  <line x1="272" y1="116" x2="272" y2="196" stroke="#2e5aa8" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrow-link)"/>

  <!-- 4. Prober -> SLIs -->
  <line x1="328" y1="228" x2="360" y2="228" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 5. SLIs -> Evaluator -->
  <line x1="488" y1="228" x2="520" y2="228" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- 6. Evaluator -> Verdict (accent, this is the payoff) -->
  <line x1="648" y1="228" x2="680" y2="228" stroke="#eb6c36" stroke-width="1.2" marker-end="url(#arrow-accent)"/>

  <!-- 7. YAML -> Evaluator (SLO thresholds bypass, dashed curved) -->
  <path d="M 104 256 L 104 296 L 584 296 L 584 256" fill="none" stroke="#4f5d75" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- 8. Verdict -> Git History (cron mode, dashed) -->
  <line x1="744" y1="256" x2="744" y2="312" stroke="#4f5d75" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- ============================================================ -->
  <!-- Arrow labels (masked)                                        -->
  <!-- ============================================================ -->

  <!-- PROBE (up arrow, left of it) -->
  <rect x="204" y="152" width="40" height="12" rx="2" fill="#f5f5f5"/>
  <text x="224" y="160" class="mono" fill="#4f5d75" font-size="8" text-anchor="middle" letter-spacing="0.06em">PROBE</text>

  <!-- STREAM (down arrow, right of it) -->
  <rect x="280" y="152" width="48" height="12" rx="2" fill="#f5f5f5"/>
  <text x="304" y="160" class="mono" fill="#4f5d75" font-size="8" text-anchor="middle" letter-spacing="0.06em">STREAM</text>

  <!-- SLO THRESHOLDS (horizontal curved segment) -->
  <rect x="304" y="288" width="80" height="12" rx="2" fill="#f5f5f5"/>
  <text x="344" y="296" class="mono" fill="#4f5d75" font-size="8" text-anchor="middle" letter-spacing="0.06em">SLO THRESHOLDS</text>

  <!-- CRON MODE (Verdict -> Git History) -->
  <rect x="712" y="280" width="64" height="12" rx="2" fill="#f5f5f5"/>
  <text x="744" y="288" class="mono" fill="#4f5d75" font-size="8" text-anchor="middle" letter-spacing="0.06em">CRON MODE</text>

  <!-- ============================================================ -->
  <!-- Nodes                                                        -->
  <!-- ============================================================ -->

  <!-- LLM Endpoint (external) -->
  <rect x="184" y="60" width="160" height="56" rx="6" fill="#f5f5f5"/>
  <rect x="184" y="60" width="160" height="56" rx="6" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
  <rect x="192" y="68" width="24" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.35)" stroke-width="0.8"/>
  <text x="204" y="76" class="mono" fill="rgba(45,49,66,0.65)" font-size="7" text-anchor="middle" letter-spacing="0.10em">EXT</text>
  <text x="264" y="92" class="sans" fill="#2d3142" font-size="12" font-weight="600" text-anchor="middle">LLM Endpoint</text>
  <text x="264" y="108" class="mono" fill="#4f5d75" font-size="9" text-anchor="middle">streaming API</text>

  <!-- YAML Config (input) -->
  <rect x="40" y="200" width="128" height="56" rx="6" fill="#f5f5f5"/>
  <rect x="40" y="200" width="128" height="56" rx="6" fill="rgba(79,93,117,0.10)" stroke="#7a8399" stroke-width="1"/>
  <rect x="48" y="208" width="32" height="12" rx="2" fill="transparent" stroke="rgba(122,131,153,0.6)" stroke-width="0.8"/>
  <text x="64" y="216" class="mono" fill="#7a8399" font-size="7" text-anchor="middle" letter-spacing="0.10em">INPUT</text>
  <text x="104" y="232" class="sans" fill="#2d3142" font-size="12" font-weight="600" text-anchor="middle">YAML Config</text>
  <text x="104" y="248" class="mono" fill="#4f5d75" font-size="9" text-anchor="middle">.llm-slo.yaml</text>

  <!-- Prober (backend) -->
  <rect x="200" y="200" width="128" height="56" rx="6" fill="#f5f5f5"/>
  <rect x="200" y="200" width="128" height="56" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <rect x="208" y="208" width="24" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.4)" stroke-width="0.8"/>
  <text x="220" y="216" class="mono" fill="#2d3142" font-size="7" text-anchor="middle" letter-spacing="0.10em">SVC</text>
  <text x="264" y="232" class="sans" fill="#2d3142" font-size="12" font-weight="600" text-anchor="middle">Prober</text>
  <text x="264" y="248" class="mono" fill="#4f5d75" font-size="9" text-anchor="middle">SSE stream</text>

  <!-- SLIs (store) -->
  <rect x="360" y="200" width="128" height="56" rx="6" fill="#f5f5f5"/>
  <rect x="360" y="200" width="128" height="56" rx="6" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
  <rect x="368" y="208" width="36" height="12" rx="2" fill="transparent" stroke="rgba(79,93,117,0.5)" stroke-width="0.8"/>
  <text x="386" y="216" class="mono" fill="#4f5d75" font-size="7" text-anchor="middle" letter-spacing="0.10em">STORE</text>
  <text x="424" y="232" class="sans" fill="#2d3142" font-size="12" font-weight="600" text-anchor="middle">SLIs</text>
  <text x="424" y="248" class="mono" fill="#4f5d75" font-size="9" text-anchor="middle">TTFT · rates · errs</text>

  <!-- SLO Evaluator (FOCAL — accent) -->
  <rect x="520" y="200" width="128" height="56" rx="6" fill="#f5f5f5"/>
  <rect x="520" y="200" width="128" height="56" rx="6" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1.2"/>
  <rect x="528" y="208" width="28" height="12" rx="2" fill="transparent" stroke="rgba(235,108,54,0.5)" stroke-width="0.8"/>
  <text x="542" y="216" class="mono" fill="#eb6c36" font-size="7" text-anchor="middle" letter-spacing="0.10em">CORE</text>
  <text x="584" y="232" class="sans" fill="#2d3142" font-size="12" font-weight="600" text-anchor="middle">SLO Evaluator</text>
  <text x="584" y="248" class="mono" fill="#4f5d75" font-size="9" text-anchor="middle">SLI vs SLO</text>

  <!-- Verdict (backend) -->
  <rect x="680" y="200" width="128" height="56" rx="6" fill="#f5f5f5"/>
  <rect x="680" y="200" width="128" height="56" rx="6" fill="#ffffff" stroke="#2d3142" stroke-width="1"/>
  <rect x="688" y="208" width="24" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.4)" stroke-width="0.8"/>
  <text x="700" y="216" class="mono" fill="#2d3142" font-size="7" text-anchor="middle" letter-spacing="0.10em">OUT</text>
  <text x="744" y="232" class="sans" fill="#2d3142" font-size="12" font-weight="600" text-anchor="middle">Verdict</text>
  <text x="744" y="248" class="mono" fill="#4f5d75" font-size="9" text-anchor="middle">exit 0 / 1 / 2</text>

  <!-- Git History (optional, dashed) -->
  <rect x="680" y="316" width="128" height="56" rx="6" fill="#f5f5f5"/>
  <rect x="680" y="316" width="128" height="56" rx="6" fill="rgba(45,49,66,0.02)" stroke="rgba(45,49,66,0.30)" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="688" y="324" width="28" height="12" rx="2" fill="transparent" stroke="rgba(45,49,66,0.35)" stroke-width="0.8"/>
  <text x="702" y="332" class="mono" fill="rgba(45,49,66,0.65)" font-size="7" text-anchor="middle" letter-spacing="0.10em">CRON</text>
  <text x="744" y="348" class="sans" fill="#2d3142" font-size="12" font-weight="600" text-anchor="middle">Git History</text>
  <text x="744" y="364" class="mono" fill="#4f5d75" font-size="9" text-anchor="middle">history/*.json</text>

  <!-- ============================================================ -->
  <!-- Legend (horizontal strip at bottom)                          -->
  <!-- ============================================================ -->
  <line x1="40" y1="408" x2="840" y2="408" stroke="rgba(45,49,66,0.10)" stroke-width="0.8"/>
  <text x="40" y="432" class="mono" fill="#4f5d75" font-size="8" letter-spacing="0.14em">LEGEND</text>

  <!-- Focal -->
  <rect x="120" y="420" width="16" height="12" rx="2" fill="rgba(235,108,54,0.08)" stroke="#eb6c36" stroke-width="1"/>
  <text x="144" y="432" class="sans" fill="#4f5d75" font-size="10">Focal</text>

  <!-- External -->
  <rect x="204" y="420" width="16" height="12" rx="2" fill="rgba(45,49,66,0.03)" stroke="rgba(45,49,66,0.30)" stroke-width="1"/>
  <text x="228" y="432" class="sans" fill="#4f5d75" font-size="10">External</text>

  <!-- Store -->
  <rect x="304" y="420" width="16" height="12" rx="2" fill="rgba(45,49,66,0.05)" stroke="#4f5d75" stroke-width="1"/>
  <text x="328" y="432" class="sans" fill="#4f5d75" font-size="10">Store</text>

  <!-- Optional (cron / dashed) -->
  <rect x="384" y="420" width="16" height="12" rx="2" fill="rgba(45,49,66,0.02)" stroke="rgba(45,49,66,0.30)" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="408" y="432" class="sans" fill="#4f5d75" font-size="10">Optional (cron)</text>

  <!-- HTTP / stream arrow -->
  <line x1="524" y1="428" x2="556" y2="428" stroke="#2e5aa8" stroke-width="1" marker-end="url(#arrow-link)"/>
  <text x="564" y="432" class="sans" fill="#4f5d75" font-size="10">HTTP / stream</text>

  <!-- Accent arrow (payoff) -->
  <line x1="672" y1="428" x2="704" y2="428" stroke="#eb6c36" stroke-width="1.2" marker-end="url(#arrow-accent)"/>
  <text x="712" y="432" class="sans" fill="#4f5d75" font-size="10">Verdict</text>
</svg>
