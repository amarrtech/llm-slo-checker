name: Live SLO Check

on:
  schedule:
    - cron: "0 * * * *"  # top of every hour
  workflow_dispatch:       # manual trigger button

jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # allow committing history
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e .
      - name: Probe Anthropic Sonnet
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p history
          llm-slo check \
            --config examples/anthropic-sonnet.yaml \
            --samples 20 \
            --output json \
            --no-color \
            > "history/$(date -u +'%Y-%m-%d-%H%M%S').json" || echo "SLO violation captured in history"
      - name: Append to running log
        run: |
          echo "$(date -u +'%Y-%m-%dT%H:%M:%SZ') check completed" >> history/log.txt
      - name: Commit history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history/
          git commit -m "chore: append slo check $(date -u +'%Y-%m-%dT%H:%M:%SZ')" || echo "no changes to commit"
          git push
